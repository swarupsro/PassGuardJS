<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PassGuardJS Vanilla Example</title>
    <style>
      body {
        color: #1f2937;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        margin: 2rem auto;
        max-width: 40rem;
        padding: 0 1rem;
      }

      label,
      input,
      meter {
        display: block;
        width: 100%;
      }

      input {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 1rem;
        margin: 0.5rem 0 1rem;
        padding: 0.75rem;
      }

      meter {
        height: 0.75rem;
      }

      ul {
        padding-left: 1.25rem;
      }
    </style>
  </head>
  <body>
    <h1>Create a password</h1>
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="new-password" />
    <meter id="meter" min="0" max="100" value="0"></meter>
    <p id="summary">Score: 0 - Very Weak</p>
    <ul id="issues"></ul>

    <script type="module">
      import { analyzePassword } from '../../dist/index.js';

      const input = document.querySelector('#password');
      const meter = document.querySelector('#meter');
      const summary = document.querySelector('#summary');
      const issues = document.querySelector('#issues');

      input.addEventListener('input', () => {
        const result = analyzePassword(input.value, {
          minLength: 12,
          requireUppercase: true,
          requireLowercase: true,
          requireNumber: true,
          requireSpecialChar: true,
          userInputs: ['swarup', 'swarup@example.com'],
        });

        meter.value = result.score;
        summary.textContent = `Score: ${result.score} - ${result.strength}`;
        issues.replaceChildren(
          ...result.issues.map((issue) => {
            const item = document.createElement('li');
            item.textContent = issue;
            return item;
          }),
        );
      });
    </script>
  </body>
</html>
